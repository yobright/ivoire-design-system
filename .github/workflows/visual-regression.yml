name: Visual Regression Testing

# Disabled until Chromatic is configured
# To enable: add CHROMATIC_PROJECT_TOKEN secret in GitHub repo settings
on:
  workflow_dispatch:

jobs:
  visual-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build design tokens
        run: |
          cd packages/ivds-design-tokens
          yarn build

      - name: Build core styles
        run: |
          cd packages/ivds-core
          yarn build

      - name: Build React components
        run: |
          cd packages/ivds-react
          yarn build

      - name: Run Chromatic visual regression tests
        uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/ivds-react
          buildScriptName: build-storybook
          exitZeroOnChanges: true
          exitOnceUploaded: true
          autoAcceptChanges: main
          onlyChanged: true
