name: Release

on:
  push:
    tags:
      - 'v*'
      - 'design-tokens-v*'
      - 'core-v*'
      - 'react-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - 'design-tokens'
          - 'core'
          - 'react'
          - 'all'
      version:
        description: 'Version type'
        required: true
        type: choice
        options:
          - 'patch'
          - 'minor'
          - 'major'
          - 'prerelease'

jobs:
  determine-packages:
    name: Determine packages to release
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine packages to release
        id: packages
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.package }}" == "all" ]]; then
              echo "packages=[\"design-tokens\", \"core\", \"react\"]" >> $GITHUB_OUTPUT
            else
              echo "packages=[\"${{ github.event.inputs.package }}\"]" >> $GITHUB_OUTPUT
            fi
          else
            # Determine from tag
            TAG_NAME=${GITHUB_REF#refs/tags/}
            if [[ $TAG_NAME == design-tokens-v* ]]; then
              echo "packages=[\"design-tokens\"]" >> $GITHUB_OUTPUT
            elif [[ $TAG_NAME == core-v* ]]; then
              echo "packages=[\"core\"]" >> $GITHUB_OUTPUT
            elif [[ $TAG_NAME == react-v* ]]; then
              echo "packages=[\"react\"]" >> $GITHUB_OUTPUT
            else
              echo "packages=[\"design-tokens\", \"core\", \"react\"]" >> $GITHUB_OUTPUT
            fi
          fi

  release:
    name: Release packages
    runs-on: ubuntu-latest
    needs: determine-packages
    strategy:
      matrix:
        package: ${{ fromJson(needs.determine-packages.outputs.packages) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build dependencies
        run: |
          if [[ "${{ matrix.package }}" != "design-tokens" ]]; then
            (cd packages/ivds-design-tokens && yarn build)
          fi
          if [[ "${{ matrix.package }}" == "react" ]]; then
            (cd packages/ivds-core && yarn build)
          fi

      - name: Build package
        run: |
          cd packages/ivds-${{ matrix.package }}
          yarn build

      - name: Run tests
        run: |
          cd packages/ivds-${{ matrix.package }}
          yarn test

      - name: Version package (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd packages/ivds-${{ matrix.package }}
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json
          NEW_VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore(release): @ivds/${{ matrix.package }}@${NEW_VERSION}"
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Get version from tag
        if: github.event_name == 'push'
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          if [[ $TAG_NAME == *-v* ]]; then
            NEW_VERSION=${TAG_NAME##*-v}
          else
            NEW_VERSION=${TAG_NAME#v}
          fi
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Check if version changed
        id: version-check
        run: |
          cd packages/ivds-${{ matrix.package }}
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view @ivds/${{ matrix.package }} version 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.changed == 'true'
        run: |
          cd packages/ivds-${{ matrix.package }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version-check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ matrix.package }}-v${{ steps.version-check.outputs.current }}
          name: ${{ matrix.package }} v${{ steps.version-check.outputs.current }}
          body: |
            ## @ivds/${{ matrix.package }} v${{ steps.version-check.outputs.current }}
            
            ### Installation
            ```bash
            npm install @ivds/${{ matrix.package }}@${{ steps.version-check.outputs.current }}
            # or
            yarn add @ivds/${{ matrix.package }}@${{ steps.version-check.outputs.current }}
            ```
            
            ### Changes
            See the [changelog](https://github.com/${{ github.repository }}/compare/${{ matrix.package }}-v${{ steps.version-check.outputs.published }}...${{ matrix.package }}-v${{ steps.version-check.outputs.current }}) for details.
          draft: false
          prerelease: ${{ contains(steps.version-check.outputs.current, '-') }}

  deploy-storybooks:
    name: Deploy Storybooks to GitHub Pages
    runs-on: ubuntu-latest
    needs: [determine-packages, release]
    if: contains(needs.determine-packages.outputs.packages, 'core') || contains(needs.determine-packages.outputs.packages, 'react')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build design tokens
        run: |
          cd packages/ivds-design-tokens
          yarn build

      - name: Build and deploy core Storybook
        if: contains(needs.determine-packages.outputs.packages, 'core')
        run: |
          cd packages/ivds-core
          yarn build
          yarn build-storybook

      - name: Build and deploy React Storybook
        if: contains(needs.determine-packages.outputs.packages, 'react')
        run: |
          cd packages/ivds-react
          yarn build
          yarn build-storybook

      - name: Prepare deployment directory
        run: |
          mkdir -p deploy
          if [ -d "packages/ivds-core/storybook-static" ]; then
            cp -r packages/ivds-core/storybook-static deploy/core
          fi
          if [ -d "packages/ivds-react/storybook-static" ]; then
            cp -r packages/ivds-react/storybook-static deploy/react
          fi
          
          # Create index.html for main page
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>IVDS Design System</title>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <style>
              body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
              .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 1.5rem; margin: 1rem 0; }
              .button { display: inline-block; background: #3b82f6; color: white; padding: 0.75rem 1.5rem; text-decoration: none; border-radius: 6px; margin: 0.5rem 0.5rem 0.5rem 0; }
              .button:hover { background: #2563eb; }
            </style>
          </head>
          <body>
            <h1>IVDS Design System</h1>
            <p>A comprehensive design system with design tokens, CSS components, and React components.</p>
            
            <div class="card">
              <h2>📚 Documentation</h2>
              <a href="./core/" class="button">Core CSS Components</a>
              <a href="./react/" class="button">React Components</a>
            </div>
            
            <div class="card">
              <h2>📦 Packages</h2>
              <ul>
                <li><strong>@ivds/design-tokens</strong> - Design tokens (colors, typography, spacing)</li>
                <li><strong>@ivds/core</strong> - CSS-only component library</li>
                <li><strong>@ivds/react</strong> - React component library</li>
              </ul>
            </div>
            
            <div class="card">
              <h2>🚀 Quick Start</h2>
              <pre><code># Install design tokens
          npm install @ivds/design-tokens
          
          # Install CSS components
          npm install @ivds/core @ivds/design-tokens
          
          # Install React components
          npm install @ivds/react @ivds/core @ivds/design-tokens</code></pre>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          cname: ivds.design
